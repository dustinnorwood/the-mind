services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    expose:
      - "8000"
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
    environment:
      - GAME_WS_URL=ws://${PUBLIC_HOST:-localhost}/game-ws
    expose:
      - "3911"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
