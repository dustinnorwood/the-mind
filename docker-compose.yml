services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    expose:
      - "8000"
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
    environment:
      - GAME_WS_URL=wss://${PUBLIC_HOST:-localhost}/game-ws
    expose:
      - "3003"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      - PUBLIC_HOST=${PUBLIC_HOST:-localhost}
    command: >
      /bin/sh -c "envsubst '$$PUBLIC_HOST' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - app-network
    restart: unless-stopped

volumes:
  certbot-webroot:
  certbot-certs:

networks:
  app-network:
    driver: bridge
