worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3003;
    }

    upstream backend {
        server backend:8000;
    }

    # HTTP — redirect to HTTPS, except ACME challenge
    server {
        listen 80;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;

        ssl_certificate /etc/letsencrypt/live/${PUBLIC_HOST}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${PUBLIC_HOST}/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Game WebSocket — route to backend
        location /game-ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Everything else — frontend (jsaddle-warp, including its own WebSocket)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
